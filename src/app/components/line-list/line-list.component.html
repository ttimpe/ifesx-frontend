<!-- line-list.component.html -->
<div class="flex flex-col h-full bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
  <!-- Header Toolbar -->
  <div class="flex items-center justify-between p-4 border-b border-slate-100 bg-slate-50/50">
    <div class="flex items-center gap-4">
      <div class="w-10 h-10 bg-indigo-100 text-indigo-600 rounded-lg flex items-center justify-center">
        <fa-icon [icon]="faRoute" class="text-xl"></fa-icon>
      </div>
      <div>
        <h2 class="text-lg font-bold text-slate-800 tracking-tight">Linien</h2>
        <p class="text-xs text-slate-500 font-medium">{{lines.length}} Einträge gefunden</p>
      </div>
    </div>

    <div class="flex items-center gap-3">
      <div class="relative flex items-center">
        <i class="pi pi-search absolute left-3 text-slate-400 z-10 pointer-events-none"></i>
        <input type="text" pInputText placeholder="Suchen..." (input)="applyFilterGlobal($event, 'contains')"
          class="!pl-10 !pr-4 !py-2 !border !border-slate-300 !rounded-lg !text-sm !w-64 focus:!border-indigo-500 focus:!ring-2 focus:!ring-indigo-100 !bg-white transition-all shadow-sm" />
      </div>
      <p-button label="Neue Linie" icon="pi pi-plus" severity="success" (onClick)="addLine()" size="small"></p-button>
    </div>
  </div>

  <!-- Table -->
  <div class="flex-1 overflow-auto bg-white p-2">
    <p-table #dt [value]="lines" [rows]="100" [paginator]="true"
      [globalFilterFields]="['LI_KUERZEL', 'LIDNAME', 'LI_NR']" [tableStyle]="{ 'min-width': '50rem' }"
      [rowHover]="true" dataKey="LI_NR"
      currentPageReportTemplate="Zeige {first} bis {last} von {totalRecords} Einträgen" [showCurrentPageReport]="true"
      styleClass="p-datatable-striped">

      <ng-template pTemplate="header">
        <tr>
          <th pSortableColumn="LI_NR" class="font-semibold text-sm text-slate-700" style="width:10%">ID <p-sortIcon
              field="LI_NR"></p-sortIcon></th>
          <th pSortableColumn="LI_KUERZEL" class="font-semibold text-sm text-slate-700" style="width:15%">Nummer
            <p-sortIcon field="LI_KUERZEL"></p-sortIcon></th>
          <th pSortableColumn="LIDNAME" class="font-semibold text-sm text-slate-700" style="width:45%">Bezeichnung
            <p-sortIcon field="LIDNAME"></p-sortIcon></th>
          <th pSortableColumn="variantCount" class="font-semibold text-sm text-slate-700" style="width:12%">Fahrwege
            <p-sortIcon field="variantCount"></p-sortIcon></th>
          <th class="font-semibold text-sm text-slate-700" style="width:18%">Aktionen</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-line>
        <tr class="hover:bg-slate-50 transition-colors cursor-pointer" (click)="editLine(line)">
          <td class="font-medium text-slate-600">{{ line.LI_NR }}</td>
          <td>
            <span class="inline-block px-2 py-1 rounded bg-slate-100 text-slate-700 font-bold text-center min-w-[3rem]">
              {{ line.LI_KUERZEL }}
            </span>
          </td>
          <td class="text-slate-800">{{ line.LIDNAME }}</td>
          <td class="text-slate-600">
            <span class="inline-flex items-center gap-1.5">
              <i class="pi pi-map-marker text-blue-500 text-xs"></i>{{ line.variantCount || 0 }}
            </span>
          </td>
          <td>
            <div class="flex gap-2">
              <p-button icon="pi pi-pencil" [text]="true" severity="warn" size="small"
                (onClick)="editLine(line); $event.stopPropagation()"></p-button>
              <p-button icon="pi pi-trash" [text]="true" severity="danger" size="small"
                (onClick)="deleteLine(line); $event.stopPropagation()"></p-button>
            </div>
          </td>
        </tr>
      </ng-template>
      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="5" class="text-center p-8 text-slate-500">
            <div class="flex flex-col items-center justify-center">
              <i class="pi pi-directions text-4xl mb-3 text-slate-300"></i>
              <p>Keine Linien gefunden.</p>
            </div>
          </td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</div>

<!-- Wizard: Neue Linie + erster Fahrweg -->
<p-dialog header="Neue Linie anlegen" [(visible)]="showCreateDialog" [modal]="true" [style]="{ width: '32rem' }"
  [draggable]="false" [resizable]="false">
  <div class="flex flex-col gap-5 pt-2">
    <!-- Linie -->
    <div>
      <h4 class="text-xs font-bold text-slate-500 uppercase mb-3 flex items-center gap-2">
        <i class="pi pi-share-alt text-indigo-500"></i> Linie
      </h4>
      <div class="grid grid-cols-2 gap-4">
        <div class="flex flex-col gap-2 col-span-2">
          <label class="text-xs font-semibold text-slate-500 uppercase">Liniennummer (LI_KUERZEL) *</label>
          <input pInputText [(ngModel)]="newLine.LI_KUERZEL" maxlength="6" class="w-full font-bold" />
        </div>
        <div class="flex flex-col gap-2">
          <label class="text-xs font-semibold text-slate-500 uppercase">Linien-Code</label>
          <p-inputNumber [(ngModel)]="newLine.LINIEN_CODE" [useGrouping]="false" styleClass="w-full"></p-inputNumber>
        </div>
        <div class="flex flex-col gap-2">
          <label class="text-xs font-semibold text-slate-500 uppercase">Bereich</label>
          <p-select [options]="bereichOptions" [(ngModel)]="newLine.BEREICH_NR" optionLabel="label"
            optionValue="value" [showClear]="true" placeholder="Bereich wählen" styleClass="w-full"
            appendTo="body"></p-select>
        </div>
      </div>
    </div>

    <!-- Erster Fahrweg -->
    <div class="border-t border-slate-100 pt-4">
      <h4 class="text-xs font-bold text-slate-500 uppercase mb-3 flex items-center gap-2">
        <i class="pi pi-map-marker text-blue-500"></i> Erster Fahrweg
      </h4>
      <div class="grid grid-cols-2 gap-4">
        <div class="flex flex-col gap-2">
          <label class="text-xs font-semibold text-slate-500 uppercase">Code (STR_LI_VAR) *</label>
          <input pInputText [(ngModel)]="newLine.STR_LI_VAR" maxlength="6" class="w-full font-mono" />
        </div>
        <div class="flex flex-col gap-2">
          <label class="text-xs font-semibold text-slate-500 uppercase">Richtung</label>
          <p-select [options]="directionOptions" [(ngModel)]="newLine.LI_RI_NR" optionLabel="label"
            optionValue="value" styleClass="w-full" appendTo="body"></p-select>
        </div>
        <div class="flex flex-col gap-2 col-span-2">
          <label class="text-xs font-semibold text-slate-500 uppercase">Bezeichnung (LIDNAME)</label>
          <input pInputText [(ngModel)]="newLine.LIDNAME" maxlength="40" class="w-full" />
        </div>
      </div>
    </div>
  </div>

  <ng-template pTemplate="footer">
    <p-button label="Abbrechen" icon="pi pi-times" severity="secondary" [text]="true"
      (onClick)="showCreateDialog = false"></p-button>
    <p-button label="Anlegen" icon="pi pi-check" severity="success" [loading]="isSaving"
      (onClick)="createLine()"></p-button>
  </ng-template>
</p-dialog>
